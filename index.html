<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INST377 Lab 7</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Let's Lookup some Books</h1>

    <form id="bookForm">
      <label for="bookInput">Please enter a book name:</label><br />
      <input type="text" id="bookInput" name="bookInput" required />
      <button type="submit">Search</button>
    </form>

    <p id="loadingMessage" class="hidden">Please wait while we load the books</p>

    <table id="resultsTable" class="hidden">
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
        </tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
